<svg xmlns="http://www.w3.org/2000/svg" viewBox="8 4 124 130" width="114" height="120" fill="none">
  <!-- ears: chunky, rounded, gentle outward tilts -->
  <g transform="rotate(-14 74 62)">
    <rect x="65" y="16" width="18" height="48" rx="9" fill="#FF6600"/>
    <rect x="70" y="24" width="8" height="32" rx="4" fill="#FFB380"/>
  </g>
  <g transform="rotate(16 100 62)">
    <rect x="91" y="14" width="18" height="48" rx="9" fill="#FF6600"/>
    <rect x="96" y="22" width="8" height="32" rx="4" fill="#FFB380"/>
  </g>
  <!-- soft round head -->
  <path d="M86,56 C66,56 53,69 53,87 C53,104 68,117 86,117 C104,117 119,104 119,87 C119,69 106,56 86,56 Z" fill="#FF6600"/>
  <!-- stuffed cheek (left, toward the beet) -->
  <circle cx="66" cy="97" r="4" fill="#EE9CC4" opacity="0.9"/>
  <circle cx="106" cy="97" r="4" fill="#EE9CC4" opacity="0.85"/>
  <!-- blissful closed eyes -->
  <path d="M70,84 Q76,90 82,84" stroke="#4A1D00" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M94,84 Q100,90 106,84" stroke="#4A1D00" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- nose + little content smile -->
  <path d="M85,94 L88,98 L91,94" stroke="#4A1D00" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M83,103 Q88,107 93,103" stroke="#4A1D00" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  <!-- the beetroot: upright, leaves up, a bite taken from its right side -->
  <g transform="translate(34,96) rotate(-10)">
    <path d="M2,-24 C0,-30 1,-35 4,-39" stroke="#2C8B4E" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M4,-39 C-1,-41 -3,-47 1,-49 C6,-51 9,-46 8,-42 C7,-40 6,-39 4,-39 Z" fill="#3DAE62"/>
    <path d="M-4,-25 C-9,-29 -15,-30 -18,-26 C-21,-22 -18,-18 -13,-18 C-9,-18 -6,-21 -4,-25 Z" fill="#2C8B4E"/>
    <path d="M0,-24 C-11,-24 -18,-16 -18,-7 C-18,5 -9,14 0,20 C3,18 7,14 10,10 C4,8 4,2 9,0 C3,-2 3,-8 8,-10 C12,-13 13,-17 11,-20 C8,-23 5,-24 0,-24 Z" fill="#CE3D80"/>
    <path d="M-10,-21 C-15,-17 -18,-12 -18,-7 C-18,2 -12,10 -4,16 C-9,6 -11,-8 -10,-21 Z" fill="#8E1A52" opacity="0.55"/>
    <path d="M0,20 C0,25 2,28 0,32" stroke="#8E1A52" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  </g>
  <!-- crumbs drifting toward the mouth -->
  <circle cx="57" cy="90" r="1.8" fill="#CE3D80"/>
  <circle cx="63" cy="84" r="1.4" fill="#CE3D80" opacity="0.8"/></svg>

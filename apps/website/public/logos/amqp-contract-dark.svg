<svg xmlns="http://www.w3.org/2000/svg" viewBox="-16 -30 120 162" width="104" height="140" fill="none">
  <!-- rabbit ears: left up, right flopped — the RabbitMQ costume -->
  <g transform="rotate(-5 40 30)">
    <rect x="32" y="-24" width="17" height="58" rx="8.5" fill="#FF6600"/>
    <rect x="36.5" y="-16" width="8" height="42" rx="4" fill="#FFB380"/>
  </g>
  <g transform="rotate(16 60 26)">
    <rect x="52" y="-22" width="17" height="54" rx="8.5" fill="#FF6600"/>
    <rect x="56.5" y="-14" width="8" height="38" rx="4" fill="#FFB380"/>
  </g>
  <!-- small side leaves stay — it is still a beet under the costume -->
  <path d="M41,36 C34,31 26,30 21,34 C16,38 19,45 26,45 C32,45 38,41 41,36 Z" fill="#2C8B4E"/>
  <path d="M57,34 C62,27 70,24 76,28 C81,32 78,39 71,40 C65,40 60,37 57,34 Z" fill="#3DAE62"/>
  <!-- arms: right rests, left holds the envelope -->
  <g transform="rotate(-52 16 66)"><rect x="0" y="62" width="20" height="9" rx="4.5" fill="#CE3D80"/></g>
  <g transform="rotate(24 84 78)"><rect x="76" y="74" width="18" height="9" rx="4.5" fill="#8E1A52"/></g>
  <!-- chubby beet body -->
  <path d="M50,32 C28,31 14,45 14,62 C14,81 30,98 44,108 C47,111 48,114 50,116 C52,114 53,111 56,108 C70,98 86,81 86,62 C86,45 72,31 50,32 Z" fill="#CE3D80"/>
  <path d="M63,35 C76,41 86,50 86,62 C86,79 73,94 58,106 C69,91 78,76 78,62 C78,51 72,42 63,35 Z" fill="#8E1A52" opacity="0.85"/>
  <!-- face -->
  <circle cx="38" cy="60" r="5.2" fill="#3A0D24"/>
  <circle cx="39.7" cy="58.3" r="1.8" fill="#FFFFFF"/>
  <circle cx="63" cy="60" r="5.2" fill="#3A0D24"/>
  <circle cx="64.7" cy="58.3" r="1.8" fill="#FFFFFF"/>
  <path d="M41,71 Q50.5,80 60,71" stroke="#3A0D24" stroke-width="3.4" stroke-linecap="round" fill="none"/>
  <circle cx="29" cy="69" r="4.2" fill="#EE9CC4" opacity="0.75"/>
  <circle cx="72" cy="69" r="4.2" fill="#EE9CC4" opacity="0.75"/>
  <!-- curly tail -->
  <path d="M50,116 C49,121 52,124 49,129 C47,132 44,132 43,130" stroke="#8E1A52" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- the envelope, held up in the left paw -->
  <g transform="translate(-15,38) rotate(-16)">
    <rect x="0" y="0" width="30" height="21" rx="3" fill="#FF6600"/>
    <path d="M1.5,3 L15,13 L28.5,3" stroke="#FFB380" stroke-width="2.4" fill="none" stroke-linejoin="round"/>
  </g></svg>
